<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>函數畫圖闖關遊戲</title>
    <script src="https://unpkg.com/d3@3/d3.min.js"></script>
    <script src="https://unpkg.com/function-plot@1.24.0/dist/function-plot.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: 0.2s;
        }
        .btn-google { background-color: #4285F4; color: white; }
        .btn-guest { background-color: #34A853; color: white; }
        .btn-logout { background-color: #EA4335; color: white; }
        button:hover { opacity: 0.9; }
        .hidden { display: none !important; }
        #user-display { font-weight: bold; margin-bottom: 15px; }
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>方塊函數挑戰賽 📈</h1>
    <p>精準輸入函數，逼近目標圖形！</p>
    <hr>

    <div id="login-section">
        <p>請選擇登入方式開始遊戲</p>
        <button class="btn-google" id="btn-google">使用 Google 登入</button>
        <button class="btn-guest" id="btn-guest">以 訪客身分 試玩</button>
    </div>

    <div id="username-section" class="hidden">
        <h2>建立你的遊戲暱稱</h2>
        <p>請輸入一個不重複的使用者名稱：</p>
        <input type="text" id="username-input" placeholder="請輸入暱稱...">
        <br>
        <button class="btn-guest" id="btn-submit-username">確定進入遊戲</button>
    </div>

    <div id="game-section" class="hidden">
        <div id="user-display"></div>
        <hr>
        
        <h3>第 <span id="current-level">1</span> 關：逼近這個函數圖形！</h3>
        <p style="font-size: 14px; color: #666;">（藍色：目標線條 / 紅色：你的輸入）</p>
        
        <div id="plot-container" style="display: flex; justify-content: center; margin: 20px 0;">
            <div id="my-plot"></div>
        </div>

        <div style="margin: 20px 0;">
            <label for="player-input" style="font-size: 18px; font-weight: bold;">f(x) = </label>
            <input type="text" id="player-input" placeholder="例如: 2 * x + 1 或 x^2" style="width: 50%;">
            <button class="btn-guest" id="btn-submit-answer" style="margin: 0 0 0 10px;">提交答案</button>
        </div>

        <h3 id="score-display" style="color: #ea4335; min-height: 30px;"></h3>
        
        <button id="btn-next-level" style="display: none; background-color: #f4b400; color: white;">下一關</button>
        <hr>
        <button class="btn-logout" id="btn-logout">登出 / 離開遊戲</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 你的 Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyD8adS5yAGhkhUzdjG2WJrkjRutjRY8HzI",
      authDomain: "functiongame-3c32f.firebaseapp.com",
      projectId: "functiongame-3c32f",
      storageBucket: "functiongame-3c32f.firebasestorage.app",
      messagingSenderId: "325873073665",
      appId: "1:325873073665:web:83e3ceb3c0d827fe834a00"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserUid = null;
    let currentUsername = null;
    let isAnonymousUser = false;
    let currentLevel = 1;
    let targetFormula = ""; 
    let playerFormula = ""; 

    const loginSection = document.getElementById('login-section');
    const usernameSection = document.getElementById('username-section');
    const gameSection = document.getElementById('game-section');
    const userDisplay = document.getElementById('user-display');
    const usernameInput = document.getElementById('username-input');

    // 監聽登入（含自動清理未正常登出訪客的機制）
    onAuthStateChanged(auth, async (user) => {
        // 🛡️ 檢查上一次有沒有沒點登出就直接關網頁或重開的訪客殘留進度
        const savedGuestUid = sessionStorage.getItem('pending_clean_guest_uid');
        const savedGuestName = sessionStorage.getItem('pending_clean_guest_name');
        
        if (savedGuestUid && savedGuestName) {
            console.log("發現未正常登出的訪客殘留資料，啟動自動背景清理...");
            try {
                await deleteDoc(doc(db, "usernames", savedGuestName));
                await deleteDoc(doc(db, "users", savedGuestUid));
                sessionStorage.removeItem('pending_clean_guest_uid');
                sessionStorage.removeItem('pending_clean_guest_name');
                console.log("殘留垃圾清理完畢！");
            } catch (e) {
                console.error("自動清理殘留失敗:", e);
            }
        }

        if (user) {
            currentUserUid = user.uid;
            isAnonymousUser = user.isAnonymous;
            
            const userDocRef = doc(db, "users", user.uid);
            const userDocSnap = await getDoc(userDocRef);

            if (userDocSnap.exists()) {
                currentUsername = userDocSnap.data().username;
                
                // 💡 如果是正常登入的訪客，成功進入大廳後立刻在瀏覽器埋下殘留憑證
                if (isAnonymousUser) {
                    sessionStorage.setItem('pending_clean_guest_uid', currentUserUid);
                    sessionStorage.setItem('pending_clean_guest_name', currentUsername);
                }
                
                enterGameLobby();
            } else {
                loginSection.classList.add('hidden');
                usernameSection.classList.remove('hidden');
                gameSection.classList.add('hidden');
            }
        } else {
            currentUserUid = null;
            currentUsername = null;
            isAnonymousUser = false;
            loginSection.classList.remove('hidden');
            usernameSection.classList.add('hidden');
            gameSection.classList.add('hidden');
        }
    });

    document.getElementById('btn-google').addEventListener('click', () => {
        const provider = new GoogleAuthProvider();
        signInWithPopup(auth, provider).catch(err => console.error(err));
    });

    document.getElementById('btn-guest').addEventListener('click', () => {
        signInAnonymously(auth).catch(err => console.error(err));
    });

    document.getElementById('btn-submit-username').addEventListener('click', async () => {
        const inputName = usernameInput.value.trim();
        if (!inputName) { alert("請輸入暱稱！"); return; }

        const nameRef = doc(db, "usernames", inputName);
        const nameSnap = await getDoc(nameRef);

        if (nameSnap.exists()) { alert("這個名稱已經有人使用了，請換一個！"); return; }

        try {
            await setDoc(nameRef, { uid: currentUserUid, isAnonymous: isAnonymousUser });
            await setDoc(doc(db, "users", currentUserUid), {
                username: inputName,
                isAnonymous: isAnonymousUser,
                createdAt: new Date()
            });

            // 💡 建立完暱稱成功，立刻記錄憑證預防他等一下直接叉掉網頁
            if (isAnonymousUser) {
                sessionStorage.setItem('pending_clean_guest_uid', currentUserUid);
                sessionStorage.setItem('pending_clean_guest_name', inputName);
            }

            currentUsername = inputName;
            enterGameLobby();
        } catch (error) {
            alert("設定失敗，請重試。");
        }
    });

    // 手動點擊登出/離開遊戲 (立刻清除資料與暫存憑證)
    document.getElementById('btn-logout').addEventListener('click', async () => {
        if (isAnonymousUser && currentUsername) {
            await deleteDoc(doc(db, "usernames", currentUsername));
            await deleteDoc(doc(db, "users", currentUserUid));
            sessionStorage.removeItem('pending_clean_guest_uid');
            sessionStorage.removeItem('pending_clean_guest_name');
        }
        await signOut(auth);
        location.reload();
    });

    // 瀏覽器快關閉時的最後防線
    window.addEventListener('beforeunload', () => {
        if (isAnonymousUser && currentUsername) {
            deleteDoc(doc(db, "usernames", currentUsername));
            deleteDoc(doc(db, "users", currentUserUid));
        }
    });

    function enterGameLobby() {
        loginSection.classList.add('hidden');
        usernameSection.classList.add('hidden');
        gameSection.classList.remove('hidden');
        userDisplay.innerHTML = `目前玩家：<strong>${currentUsername}</strong> (${isAnonymousUser ? '訪客模式（離開或關網頁自動清除）' : 'Google帳號'})`;
        
        currentLevel = 1;
        setTimeout(() => { initLevel(currentLevel); }, 150);
    }

    function initLevel(level) {
        document.getElementById('current-level').innerText = level;
        playerFormula = "";
        document.getElementById('player-input').value = "";
        document.getElementById('score-display').innerText = "";
        document.getElementById('btn-next-level').style.display = "none";
        
        generateTargetFunction(level);
        drawGraph();
    }

    function randCoeff() {
        let r = Math.floor(Math.random() * 9) - 4;
        return r === 0 ? 1 : r;
    }

    function generateTargetFunction(level) {
        if (level === 1) {
            targetFormula = `${randCoeff()} * x + (${randCoeff()})`;
        } else if (level === 2) {
            targetFormula = `${randCoeff()} * x^2 + (${randCoeff()})`;
        } else {
            targetFormula = `${randCoeff()} * sin(x) + (${randCoeff()})`;
        }
        console.log("目標公式:", targetFormula);
    }

    function drawGraph() {
        const myPlotEl = document.getElementById('my-plot');
        myPlotEl.innerHTML = ""; 

        const dataArr = [{
            fn: targetFormula,
            color: '#4285F4',
            strokeWidth: 3
        }];

        if (playerFormula) {
            dataArr.push({
                fn: playerFormula,
                color: '#EA4335',
                strokeWidth: 2
            });
        }

        try {
            functionPlot({
                target: '#my-plot',
                width: 550,
                height: 400,
                grid: true,
                xAxis: { domain: [-10, 10] },
                yAxis: { domain: [-10, 10] },
                data: dataArr
            });
        } catch (err) {
            console.error("繪圖失敗:", err);
        }
    }

    // 終極平滑反比例算分演算法（再遠都有分）
    function calculateScore(playerInput) {
        try {
            const targetCompiled = math.compile(targetFormula);
            const playerCompiled = math.compile(playerInput);
            
            let totalDistance = 0;
            let samplePoints = 20;
            let validPoints = 0;

            for (let i = -10; i <= 10; i += 20 / samplePoints) {
                let targetY = targetCompiled.evaluate({ x: i });
                let playerY = playerCompiled.evaluate({ x: i });
                
                if (isNaN(targetY) || isNaN(playerY) || !isFinite(targetY) || !isFinite(playerY)) continue;
                
                totalDistance += Math.abs(targetY - playerY);
                validPoints++;
            }

            if (validPoints === 0) return 0;
            let averageDistance = totalDistance / validPoints;
            
            // 💡 0.35 權重：貼合越好，分數衝越高，絕不輕易給 0 分
            let score = Math.round(100 / (1 + averageDistance * 0.35));
            return score;
        } catch (e) {
            return -1; 
        }
    }

    // 提交答案
    document.getElementById('btn-submit-answer').addEventListener('click', () => {
        const input = document.getElementById('player-input').value.trim();
        if (!input) { alert("請輸入函數公式！"); return; }

        const score = calculateScore(input);
        if (score === -1) {
            alert("函數格式輸入錯誤！請確認語法（例如：2 * x + 1 或 x ^ 2）");
            return;
        }

        playerFormula = input; 
        
        try {
            drawGraph(); 
        } catch (e) {
            console.log(e);
        }

        const scoreDisplay = document.getElementById('score-display');
        const nextLevelBtn = document.getElementById('btn-next-level');

        scoreDisplay.innerText = `本關得分：${score} 分！`;
        
        if (score >= 80) {
            scoreDisplay.innerText += " 🎉 (達 80 分，解鎖下一關！)";
            nextLevelBtn.style.display = "inline-block";
        } else {
            scoreDisplay.innerText += " ❌ (未滿 80 分，再調整看看！)";
            nextLevelBtn.style.display = "none";
        }
    });

    // 下一關
    document.getElementById('btn-next-level').addEventListener('click', () => {
        currentLevel++;
        setTimeout(() => { initLevel(currentLevel); }, 100);
    });
</script>
</body>
</html>
